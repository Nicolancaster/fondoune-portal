<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=portal-asociado.html">
<title>FondoUne — Redirigiendo…</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#1C2B3A;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Outfit',sans-serif;}
  .box{text-align:center;color:#fff;}
  .mark{width:56px;height:56px;background:#D4881E;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .mark svg{width:28px;height:28px;}
  .name{font-size:26px;font-weight:800;letter-spacing:-.3px;margin-bottom:8px;}
  .name span{color:#D4881E;}
  .sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:24px;}
  .spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:#D4881E;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="box">
    <div class="mark">
      <svg viewBox="0 0 20 20" fill="none"><path d="M4 3h12v3H7.5v3.5H14v3H7.5V17H4V3z" fill="#fff"/></svg>
    </div>
    <div class="name">Fondo<span>Une</span></div>
    <div class="sub">Cargando portal del asociado…</div>
    <div class="spinner"></div>
  </div>
</body>
</html>
